name: Auto Update Dashboard

on:
  push:
    branches:
      - main  # 깃허브 기본 브랜치명이 master라면 master로 변경하세요.
    paths:
      - '01_Android_Framework.md' # 이 파일이 push될 때만 로봇이 깨어납니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run update script
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        # 리드미에 변경 사항이 있을 때만 커밋을 날려 에러를 방지합니다.
        git diff-index --quiet HEAD || git commit -m "🤖 docs: GitHub Actions 대시보드 자동 업데이트"
        git push